; supervisord runs the two long-lived processes inside the one container and
; keeps the container alive (nodaemon=true). If either crashes it's restarted.
[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0

[program:uvicorn]
; The FastAPI RAG backend. Binds to localhost only — nginx is the public door.
command=uvicorn serve:app --host 127.0.0.1 --port 8088
directory=/app
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
; Foreground nginx (daemon off) so supervisord can supervise it.
command=nginx -g 'daemon off;'
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
