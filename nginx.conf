# nginx serves the React app and proxies the API to uvicorn on 127.0.0.1:8088.
# Because the page and the API share this one origin, the browser makes no
# cross-origin calls — so CORS never enters the picture for the web deployment.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API → FastAPI backend (uvicorn) ──────────────────────────────────────
    # proxy_buffering off + HTTP/1.1 keep the SSE (streaming) responses flowing
    # token-by-token instead of being buffered into one lump.
    location ~ ^/(v1|search|health) {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── Static frontend (SPA) ────────────────────────────────────────────────
    # Unknown paths fall back to index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
